<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<title>Offline — TinyShop</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F5F5F7;color:#1C1C1E;padding:20px;text-align:center}
.offline{max-width:320px}
.offline svg{color:#AEAEB2;margin-bottom:24px}
.offline h1{font-size:1.375rem;font-weight:700;margin-bottom:8px}
.offline p{font-size:0.9375rem;color:#8E8E93;line-height:1.5;margin-bottom:28px}
.offline button{display:inline-flex;align-items:center;justify-content:center;min-height:50px;padding:0 32px;background:#111;color:#fff;border:none;border-radius:14px;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
.offline button:active{transform:scale(0.97);opacity:0.9}
@media(prefers-color-scheme:dark){
body{background:#1C1C1E;color:#F5F5F7}
.offline p{color:#AEAEB2}
.offline button{background:#fff;color:#1C1C1E}
}
</style>
</head>
<body>
<div class="offline">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
</div>
</body>
</html>
